[project]
name = "ai-landing-page-uniqueizer"  # Из §1 Executive Summary
version = "1.5.0"  # PRD финализирован v1.5 (см. §8)
description = "Self-hosted web tool for parsing and multi-level uniqueization of landing pages (HTML/CSS obfuscation, AI rewriting, media mutation) with ZIP export."
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "AI Landing Page Uniqueizer Team" }
]
license = { text = "Proprietary" }
dependencies = [
    # === Backend Web Framework (см. §3.4 Dependencies Specification) ===
    "fastapi==0.115.0",
    "uvicorn[standard]==0.30.6",

    # === Data validation (см. §3.1 schemas.py, Pydantic v2) ===
    "pydantic==2.8.2",

    # === Async file handling (используется FastAPI/FileResponse workflows) ===
    "aiofiles==24.1.0",

    # === Scraper stack (Module 1, §3.3) ===
    "playwright==1.47.0",           # Headless Chromium scraping
    "beautifulsoup4==4.12.3",       # DOM parsing
    "lxml==5.3.0",                  # HTML parser backend
    "httpx==0.27.2",                # Async asset downloading

    # === AI Providers (Module 3, §3.3) ===
    "openai>=1.50.0",               # Primary provider (GPT-4o-mini)
    "anthropic>=0.34.0",            # Fallback provider (Claude)

    # === Media processing (Module 4, §3.3) ===
    "Pillow>=10.4.0",               # Image processing & EXIF stripping
    "numpy>=1.26.0",                # Gaussian noise injection
]

[project.optional-dependencies]
dev = [
    # === Testing ===
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "httpx>=0.27.2",          # For async test clients
    "coverage[toml]>=7.5",

    # === Static typing ===
    "mypy>=1.10",
    "types-aiofiles",
    "types-requests",

    # === Tooling ===
    "ruff>=0.5.0",
]

# =========================
# UV Configuration
# =========================
[tool.uv]
# Используем стандартный PyPI индекс (PRD не указывает кастомные индексы)
dev-dependencies = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "coverage[toml]>=7.5",
    "mypy>=1.10",
    "ruff>=0.5.0",
]

# =========================
# Ruff (Lint + Format)
# =========================
[tool.ruff]
target-version = "py312"
line-length = 100
indent-width = 4

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]  # pycodestyle, pyflakes, isort, bugbear, pyupgrade
ignore = []
fixable = ["ALL"]

[tool.ruff.lint.isort]
known-first-party = ["backend"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true

# =========================
# Mypy (Strict Mode)
# =========================
[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true
pretty = true
plugins = []

# FastAPI / Pydantic compatibility
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true

# SQLite row factory patterns допускают Any
[[tool.mypy.overrides]]
module = ["sqlite3"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["playwright.*", "anthropic.*"]
ignore_missing_imports = true

# =========================
# Pytest
# =========================
[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q --strict-markers --disable-warnings"
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["."]
filterwarnings = [
    "ignore::DeprecationWarning",
]

# =========================
# Coverage
# =========================
[tool.coverage.run]
branch = true
source = ["backend"]
omit = [
    "*/__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 85
exclude_lines = [
    "if __name__ == .__main__.:",
    "pragma: no cover",
]