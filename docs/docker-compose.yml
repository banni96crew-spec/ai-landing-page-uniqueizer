version: "3.9"

name: ai-landing-page-uniqueizer

networks:
  frontend_net:

volumes:
  sqlite_data:
  artifacts_data:
  jobs_data:

services:
  app:
    build:
      context: ..
    restart: unless-stopped
    networks:
      - frontend_net
    environment:
      DATABASE_URL: ${DATABASE_URL:-/app/data/app.db}
      ARTIFACTS_DIR: /app/volumes/artifacts
      JOBS_WORKDIR: /app/volumes/jobs
    volumes:
      - sqlite_data:/app/data
      - artifacts_data:/app/volumes/artifacts
      - jobs_data:/app/volumes/jobs
    ports:
      - "8000:8000"
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3